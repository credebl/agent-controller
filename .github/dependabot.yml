# .github/dependabot.yml

version: 2

updates:
  # =========================
  # Yarn Dependencies (via npm ecosystem)
  # =========================
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10

    # Group 1: all PATCH updates in one PR
    groups:
      patch-updates:
        patterns:
          - "*"
        update-types:
          - "patch"

    # Group 2: all MINOR updates in another PR
      minor-updates:
        patterns:
          - "*"
        update-types:
          - "minor"

    allow:
      - dependency-type: "all"

    labels:
      - "dependencies"
      - "yarn"

    commit-message:
      prefix: "chore"
      include: "scope"


  # =========================
  # GitHub Actions
  # =========================
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"

    labels:
      - "dependencies"
      - "github-actions"

    commit-message:
      prefix: "ci"

    # Same logic: one PR for minor, one for patch actions
    groups:
      actions-patch-updates:
        patterns:
          - "*"
        update-types:
          - "patch"

      actions-minor-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
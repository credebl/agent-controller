# .github/dependabot.yml

version: 2

updates:
  # =========================
  # Yarn Dependencies (via npm ecosystem)
  # =========================
  - package-ecosystem: 'npm' # ← use "npm", not "yarn"
    directory: '/' # or "/client" if package.json is inside a subfolder
    target-branch: 'main' # always open PRs against main
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Kolkata'

    groups:
      minor-updates:
        patterns:
          - '*'
        update-types:
          - 'minor'

    allow:
      - dependency-type: 'all'

    labels:
      - 'dependencies'
      - 'yarn' # you can keep this label for clarity

    commit-message:
      prefix: 'chore'
      include: 'scope'

  # =========================
  # GitHub Actions
  # =========================
  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'main' # always open PRs against main
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Kolkata'

    labels:
      - 'devops'
      - 'dependencies'
      - 'github-actions'

    commit-message:
      prefix: 'ci'

    groups:
      minor-updates:
        patterns:
          - '*'
        update-types:
          - 'minor'
